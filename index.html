<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sarclisa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:16px;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:100;}
.tab-btn{flex:1;padding:11px 2px 9px;font-size:11px;font-weight:700;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.tab-btn.on{color:#6d28d9;border-bottom-color:#6d28d9;}
.page{display:none;}.page.on{display:block;}
.sync-bar{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;color:#888;background:#f9f9f9;border-bottom:1px solid #eee;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.ok{background:#22c55e;}.sync-dot.err{background:#ef4444;}.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite;}

.hdr{background:#6d28d9;color:#fff;padding:13px 14px 11px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.hdr h1{font-size:17px;font-weight:700;}.hdr p{font-size:11px;opacity:.8;margin-top:2px;}
.hdr-btn{background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:18px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.sbar{padding:9px 12px 0;background:#f2f2f7;}.sbar input{width:100%;padding:9px 14px;border-radius:11px;border:1px solid #ddd;font-size:15px;background:#fff;outline:none;}
.ctrl-row{padding:7px 12px 0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ctrl-row select{border:1px solid #e5e7eb;background:#fff;color:#6d28d9;border-radius:18px;padding:5px 10px;font-size:11px;font-weight:700;outline:none;-webkit-appearance:none;}
.ctrl-btn{border:1px solid #e5e7eb;background:#fff;color:#6d28d9;border-radius:18px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.ctrl-btn.primary{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.chips{padding:6px 12px 4px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:5px 11px;border-radius:18px;font-size:11px;font-weight:700;border:1px solid #ddd;cursor:pointer;background:#fff;color:#6d28d9;flex-shrink:0;}
.chip.on{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.chip.all{background:#e5e7eb;color:#374151;border-color:#e5e7eb;}.chip.all.on{background:#374151;color:#fff;}
.pot-row{padding:0 12px 6px;display:flex;gap:6px;}

.stline{padding:4px 12px 8px;font-size:13px;color:#888;}
.dlist{padding:0 12px 90px;}
.mat-section{border-top:1px solid #f2f2f7;}

.mat-toggle-row:active{background:#f2f2f7;}

.mat-toggle-btn.sent{color:#065f46;}
.mat-chev{font-size:10px;color:#aaa;transition:transform .2s;}
.dc{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}

.dc-info{flex:1;min-width:0;}

.bA{background:#d1fae5;color:#065f46;}.bB{background:#dbeafe;color:#1e40af;}.bC{background:#f3f4f6;color:#374151;}
.sc-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700;margin-left:3px;}
.s-hi{background:#fef3c7;color:#92400e;}.s-md{background:#e0e7ff;color:#3730a3;}.s-lo{background:#f3f4f6;color:#6b7280;}

.ibtn.d{border-color:#fca5a5;color:#dc2626;}
.chev{font-size:9px;color:#ccc;padding:4px 2px;background:none;border:none;cursor:pointer;transition:transform .2s;flex-shrink:0;}

.dc-body{display:none;border-top:1px solid #f2f2f7;}.dc.open .dc-body{display:block;}

.score-detail{padding:10px 13px;background:#f5f3ff;border-bottom:1px solid #f2f2f7;}
.sd-title{font-size:12px;font-weight:700;color:#6d28d9;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.sd-items{display:flex;flex-wrap:wrap;gap:5px;}
.si{padding:4px 9px;border-radius:8px;font-size:12px;font-weight:600;}
.si-pos{background:#d1fae5;color:#065f46;}.si-neg{background:#fee2e2;color:#b91c1c;}.si-neu{background:#f3f4f6;color:#374151;}
.mrow{display:flex;align-items:center;gap:8px;padding:12px 13px;border-bottom:1px solid #f9f9f9;}
.mrow:last-child{border-bottom:none;}
.mlabel{flex:1;font-size:15px;color:#333;min-width:0;line-height:1.4;}
.stag{display:inline-block;font-size:11px;background:#d1fae5;color:#065f46;border-radius:6px;padding:3px 8px;font-weight:700;margin-left:6px;cursor:pointer;border:none;vertical-align:middle;}
.stag:active{background:#a7f3d0;}
.wbtn{display:inline-flex;align-items:center;gap:5px;background:#25D366;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.nophone{font-size:12px;color:#dc2626;background:#fee2e2;padding:6px 10px;border-radius:8px;flex-shrink:0;}

.pwrap{padding:12px 12px 90px;}
.phd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;}
.phd h2{font-size:17px;font-weight:700;}
.mcard{background:#fff;border-radius:13px;padding:13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.mcard-t{font-size:14px;font-weight:600;margin-bottom:4px;}
.mcard-p{font-size:12px;color:#888;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mcard-a{display:flex;gap:8px;margin-top:10px;}
.ccard{background:#fff;border-radius:13px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ccard-hd{padding:12px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.crank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px;}
.r1{background:#fef3c7;color:#92400e;}.r2{background:#f3f4f6;color:#374151;}.r3{background:#fce7f3;color:#9d174d;}.rn{background:#ede9fe;color:#5b21b6;}
.ccard-main{flex:1;min-width:0;}
.ccard-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ccard-sub{font-size:11px;color:#888;margin-top:3px;}
.ccard-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.cscore-box{text-align:center;}
.cscore-audit{font-size:13px;font-weight:700;color:#aaa;line-height:1;}
.cscore-total{font-size:22px;font-weight:700;color:#6d28d9;line-height:1;margin-top:2px;}
.cscore-lbl{font-size:9px;color:#aaa;margin-top:1px;}
.cscore-delta{font-size:11px;font-weight:700;padding:2px 6px;border-radius:8px;align-self:flex-start;margin-top:4px;}
.cscore-delta.pos{background:#d1fae5;color:#065f46;}
.cscore-delta.neg{background:#fee2e2;color:#b91c1c;}
.cscore-delta.zero{background:#f3f4f6;color:#888;}
.cchev{font-size:9px;color:#ccc;padding:4px 2px;background:none;border:none;cursor:pointer;transition:transform .2s;flex-shrink:0;margin-top:6px;}
.ccard.open .cchev{transform:rotate(180deg);}
.ccard-body{display:none;border-top:1px solid #f2f2f7;}.ccard.open .ccard-body{display:block;}
.cinfo-row{padding:8px 13px;background:#fafafa;border-bottom:1px solid #f2f2f7;display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:#555;align-items:center;}

.sbars{padding:10px 13px;border-bottom:1px solid #f2f2f7;}

.sbar-in{height:100%;border-radius:3px;background:#6d28d9;}
.sbar-v{width:16px;font-weight:700;color:#6d28d9;flex-shrink:0;text-align:right;}
.cmk-wrap{padding:10px 13px;border-bottom:1px solid #f2f2f7;}
.cmk-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cmk-title{font-size:12px;font-weight:700;color:#1c1c1e;}
.cmk-pts{font-size:12px;font-weight:700;}
.cmk-pts.pos{color:#065f46;}.cmk-pts.neg{color:#b91c1c;}.cmk-pts.zero{color:#888;}
.cmk-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}

.cmk-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}

.cmk-chip.pos:not(.sel){border-color:#86efac;color:#166534;}
.cmk-chip.pos.sel{background:#22c55e;color:#fff;border-color:#22c55e;}
.cmk-chip.neg:not(.sel){border-color:#fca5a5;color:#991b1b;}
.cmk-chip.neg.sel{background:#ef4444;color:#fff;border-color:#ef4444;}
.barr-wrap{padding:10px 13px;border-bottom:1px solid #f2f2f7;}
.barr-lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.barr-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;align-items:center;}
.bchip{padding:5px 11px;border-radius:16px;font-size:12px;font-weight:600;border:1px solid #ddd;cursor:pointer;background:#fff;color:#374151;}
.bchip.sel{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.cmk-add-row{display:flex;gap:6px;margin-top:8px;align-items:center;}
.cmk-add-input{flex:1;padding:7px 10px;border-radius:9px;border:1px solid #ddd;font-size:13px;background:#f9f9f9;outline:none;font-family:-apple-system,sans-serif;}
.cmk-add-pts{width:58px;padding:7px 8px;border-radius:9px;border:1px solid #ddd;font-size:13px;background:#f9f9f9;outline:none;font-family:-apple-system,sans-serif;text-align:center;flex-shrink:0;}
.cmk-add-btn{padding:7px 12px;border-radius:9px;border:none;background:#6d28d9;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.cmk-del{background:none;border:none;color:#dc2626;font-size:14px;font-weight:700;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0;margin-left:-2px;}
.cdoc-list{padding:10px 13px;}
.cdoc-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.cdoc-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f9f9f9;font-size:12px;}
.cdoc-row:last-child{border-bottom:none;}
.citycard{background:#fff;border-radius:13px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.citycard-hd{padding:12px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.city-ico{width:36px;height:36px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

.city-sb{font-size:11px;color:#888;margin-top:2px;}
.city-cnt{font-size:20px;font-weight:700;color:#6d28d9;flex-shrink:0;}
.city-chev{font-size:9px;color:#ccc;padding:4px 2px;background:none;border:none;cursor:pointer;transition:transform .2s;flex-shrink:0;}
.citycard.open .city-chev{transform:rotate(180deg);}
.citycard-body{display:none;border-top:1px solid #f2f2f7;}.citycard.open .citycard-body{display:block;}
.city-pot{padding:10px 13px;background:#fafafa;border-bottom:1px solid #f2f2f7;display:flex;gap:8px;align-items:center;}
.cpot{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:700;}
.city-docs{padding:0 13px 8px;}

.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.metric{border-radius:12px;padding:12px;text-align:center;}

.m1{background:#ede9fe;}.m1 .ml{color:#6d28d9;}.m1 .mv{color:#6d28d9;}
.m2{background:#d1fae5;}.m2 .ml{color:#065f46;}.m2 .mv{color:#065f46;}

.sec-title{font-size:15px;font-weight:700;margin:14px 0 8px;}

.bud-cat-sub{font-size:10px;color:#888;margin-top:1px;}
.bud-add-cat{background:#fff;border:2px dashed #ddd;border-radius:12px;padding:12px 13px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:13px;color:#888;font-weight:600;}
.bud-add-cat:active{background:#f9f9f9;}
.bud-sec-title{font-size:14px;font-weight:700;margin:14px 12px 8px;color:#1c1c1e;}
.bud-list{padding:0 12px;}
.bud-item{background:#fff;border-radius:12px;margin-bottom:8px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:10px;}
.bud-item-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px;}
.bud-item-info{flex:1;min-width:0;}
.bud-item-desc{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bud-item-sub{font-size:12px;color:#888;margin-top:2px;}
.bud-item-val{font-size:16px;font-weight:700;color:#dc2626;flex-shrink:0;}
.bud-item-acts{display:flex;gap:5px;flex-shrink:0;}
.bud-fab{position:fixed;bottom:22px;right:16px;width:52px;height:52px;border-radius:50%;background:#6d28d9;color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(109,40,217,.4);z-index:200;display:flex;align-items:center;justify-content:center;}
.bud-empty{text-align:center;padding:30px 20px;color:#888;font-size:14px;}
.cat-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;flex-shrink:0;}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn on" id="t0" onclick="goTab(0)">👨‍⚕️ Médicos</button>
  <button class="tab-btn" id="t2" onclick="goTab(2)">🏆 Contas</button>
  <button class="tab-btn" id="t3" onclick="goTab(3)">🗺️ Cidades</button>
  <button class="tab-btn" id="t4" onclick="goTab(4)">📊 Insights & Mat</button>
  <button class="tab-btn" id="t5" onclick="goTab(5)">💰 Budget</button>
</div>

<div class="sync-bar">
  <div class="sync-dot syncing" id="syncDot"></div>
  <span id="syncTxt">Conectando ao Firebase...</span>
</div>

<div class="page on" id="p0">
  <div class="hdr">
    <div><h1>Sarclisa · Médicos</h1><p>Ordenados por score · sincronizado em todos os devices</p></div>
    <button class="hdr-btn" onclick="openDocModal(-1)">+ Médico</button>
  </div>
  <div class="sbar"><input id="srch" type="search" placeholder="🔍 Nome, cidade ou conta..." oninput="renderDocs()" autocomplete="off" autocorrect="off" spellcheck="false"></div>
  <div class="ctrl-row">
    <select id="docSort" onchange="renderDocs()">
      <option value="score">Ordenar: Score</option>
      <option value="nome">Ordenar: Nome</option>
      <option value="cidade">Ordenar: Cidade</option>
      <option value="potencial">Ordenar: Potencial</option>
    </select>
    <button class="ctrl-btn" onclick="exportCSV()">📥 CSV</button>
    <button class="ctrl-btn primary" onclick="exportJSON()">💾 Backup</button>
    <button class="ctrl-btn" onclick="document.getElementById('importFile').click()">📂 Restaurar</button>
    <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importJSON(event)">
  </div>
  <div class="pot-row">
    <button class="pc pcA" id="pcA" onclick="togglePot('A')">● A</button>
    <button class="pc pcB" id="pcB" onclick="togglePot('B')">● B</button>
    <button class="pc pcC" id="pcC" onclick="togglePot('C')">● C</button>
  </div>
  <div class="stline" id="stline"></div>
  <div class="dlist" id="dlist"></div>
  <button class="fab" onclick="openDocModal(-1)">+</button>
</div>

<div class="page" id="p2">
  <div class="pwrap">
    <div class="phd">
      <h2>Ranking de Contas</h2>
      <div style="display:flex;gap:6px;">
        <button class="ctrl-btn" onclick="openCsvAuditModal()">📊 Importar auditoria</button>
      </div>
    </div>
    <div id="contaList"></div>
  </div>
</div>

<div class="page" id="p3">
  <div class="pwrap"><div class="phd"><h2>Clusters por Cidade</h2></div><div id="cityList"></div></div>
</div>

<div class="page" id="p4">
  <div class="pwrap">
    <h2 style="margin-bottom:12px">📊 Insights</h2>
    <div id="insDiv"></div>
    
    <div class="phd" style="margin-top:30px; border-top:1px solid #ddd; padding-top:20px;">
      <h2>📄 Materiais</h2>
      <button class="hdr-btn" style="background:#6d28d9;color:#fff" onclick="openMatModal(-1)">+ Novo</button>
    </div>
    <div id="matList"></div>
  </div>
</div>

<div class="page" id="p5">
  <div id="budHero"></div>
  <div class="bud-cats" id="budCats"></div>
  <div class="bud-sec-title">Lançamentos</div>
  <div class="bud-list" id="budList" style="padding-bottom:90px;"></div>
  <button class="bud-fab" onclick="openBudModal(-1)">+</button>
</div>

<div class="ov" id="budOv">
  <div class="modal">
    <div class="mhd"><h2 id="budMT">Novo lançamento</h2><button onclick="closeBudModal()">×</button></div>
    <div class="field">
      <label>Categoria</label>
      <select id="bCat" onchange="onBudCatChange()"></select>
    </div>
    <div class="field" id="bNewCatWrap" style="display:none">
      <label>Nome da nova categoria</label>
      <input id="bNewCat" type="text" placeholder="Ex: Jantar">
    </div>
    <div class="field">
      <label>Descrição</label>
      <input id="bDesc" type="text" placeholder="Ex: Farmácia X">
    </div>
    <div class="f2">
      <div class="field">
        <label>Valor (R$)</label>
        <input id="bVal" type="number" step="0.01" inputmode="decimal" placeholder="0,00">
      </div>
      <div class="field">
        <label>Data</label>
        <input id="bDate" type="date">
      </div>
    </div>
    <div class="brow">
      <button class="bsave" onclick="saveBud()">Salvar</button>
      <button id="bDelBtn" class="bdel" style="display:none" onclick="delBud()">Excluir</button>
      <button class="bcanc" onclick="closeBudModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// A lógica de navegação goTab continua funcionando para os IDs p0, p2, p3, p4, p5.
function goTab(idx){
  var btns = document.querySelectorAll('.tab-btn');
  var pgs = document.querySelectorAll('.page');
  btns.forEach(b => b.classList.remove('on'));
  pgs.forEach(p => p.classList.remove('on'));
  
  var targetBtn = document.getElementById('t'+idx);
  var targetPg = document.getElementById('p'+idx);
  if(targetBtn) targetBtn.classList.add('on');
  if(targetPg) targetPg.classList.add('on');
}

// ... manter demais funções JS (openMatModal, renderDocs, Firebase, etc) ...
</script>

</body>
</html>
