<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sarclisa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:15px;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:100;}
.tab-btn{flex:1;padding:11px 2px 9px;font-size:10px;font-weight:700;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.tab-btn.on{color:#6d28d9;border-bottom-color:#6d28d9;}
.page{display:none;}.page.on{display:block;}
.sync-bar{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;color:#888;background:#f9f9f9;border-bottom:1px solid #eee;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.ok{background:#22c55e;}.sync-dot.err{background:#ef4444;}.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr{background:#6d28d9;color:#fff;padding:13px 14px 11px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.hdr h1{font-size:17px;font-weight:700;}.hdr p{font-size:11px;opacity:.8;margin-top:2px;}
.hdr-btn{background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:18px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.sbar{padding:9px 12px 0;background:#f2f2f7;}.sbar input{width:100%;padding:9px 14px;border-radius:11px;border:1px solid #ddd;font-size:15px;background:#fff;outline:none;}
.ctrl-row{padding:7px 12px 0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ctrl-row select{border:1px solid #e5e7eb;background:#fff;color:#6d28d9;border-radius:18px;padding:5px 10px;font-size:11px;font-weight:700;outline:none;-webkit-appearance:none;}
.ctrl-btn{border:1px solid #e5e7eb;background:#fff;color:#6d28d9;border-radius:18px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.ctrl-btn.primary{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.chips{padding:6px 12px 4px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:5px 11px;border-radius:18px;font-size:11px;font-weight:700;border:1px solid #ddd;cursor:pointer;background:#fff;color:#6d28d9;flex-shrink:0;}
.chip.on{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.chip.all{background:#e5e7eb;color:#374151;border-color:#e5e7eb;}.chip.all.on{background:#374151;color:#fff;}
.pot-row{padding:0 12px 6px;display:flex;gap:6px;}
.pc{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;border:none;cursor:pointer;}
.pcA{background:#d1fae5;color:#065f46;}.pcB{background:#dbeafe;color:#1e40af;}.pcC{background:#f3f4f6;color:#374151;}
.pc.dim{opacity:.3;}
.stline{padding:0 12px 5px;font-size:12px;color:#888;}
.note{margin:0 12px 8px;background:#ede9fe;border-radius:10px;padding:8px 12px;font-size:12px;color:#4c1d95;line-height:1.5;}
.dlist{padding:0 12px 90px;}
.dc{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.dc-hd{padding:12px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.dc-info{flex:1;min-width:0;}
.dc-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dc-sub{font-size:11px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin-right:4px;}
.bA{background:#d1fae5;color:#065f46;}.bB{background:#dbeafe;color:#1e40af;}.bC{background:#f3f4f6;color:#374151;}
.sc-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin-left:3px;}
.s-hi{background:#fef3c7;color:#92400e;}.s-md{background:#e0e7ff;color:#3730a3;}.s-lo{background:#f3f4f6;color:#6b7280;}
.dc-acts{display:flex;gap:5px;flex-shrink:0;}
.ibtn{background:none;border:1px solid #e5e5ea;border-radius:8px;padding:5px 8px;font-size:12px;cursor:pointer;}
.ibtn.d{border-color:#fca5a5;color:#dc2626;}
.chev{font-size:9px;color:#ccc;padding:4px 2px;background:none;border:none;cursor:pointer;transition:transform .2s;flex-shrink:0;}
.dc.open .chev{transform:rotate(180deg);}
.dc-body{display:none;border-top:1px solid #f2f2f7;}.dc.open .dc-body{display:block;}
.dc-detail{padding:8px 13px;background:#fafafa;border-bottom:1px solid #f2f2f7;font-size:11px;color:#555;display:flex;flex-wrap:wrap;gap:8px;}
.dc-detail span b{color:#1c1c1e;}
.score-detail{padding:8px 13px;background:#f5f3ff;border-bottom:1px solid #f2f2f7;}
.sd-title{font-size:11px;font-weight:700;color:#6d28d9;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.sd-items{display:flex;flex-wrap:wrap;gap:5px;}
.si{padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;}
.si-pos{background:#d1fae5;color:#065f46;}.si-neg{background:#fee2e2;color:#b91c1c;}.si-neu{background:#f3f4f6;color:#374151;}
.mrow{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid #f9f9f9;}
.mrow:last-child{border-bottom:none;}
.mlabel{flex:1;font-size:13px;color:#333;min-width:0;line-height:1.3;}
.stag{display:inline-block;font-size:9px;background:#d1fae5;color:#065f46;border-radius:5px;padding:2px 6px;font-weight:700;margin-left:4px;cursor:pointer;border:none;vertical-align:middle;}
.stag:active{background:#a7f3d0;}
.wbtn{display:inline-flex;align-items:center;gap:4px;background:#25D366;color:#fff;border:none;border-radius:9px;padding:8px 11px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.nophone{font-size:11px;color:#dc2626;background:#fee2e2;padding:5px 8px;border-radius:7px;flex-shrink:0;}
.fab{position:fixed;bottom:22px;right:16px;width:52px;height:52px;border-radius:50%;background:#6d28d9;color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(109,40,217,.4);z-index:200;display:flex;align-items:center;justify-content:center;}
.pwrap{padding:12px 12px 90px;}
.phd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.phd h2{font-size:17px;font-weight:700;}
.mcard{background:#fff;border-radius:13px;padding:13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.mcard-t{font-size:14px;font-weight:600;margin-bottom:4px;}
.mcard-p{font-size:12px;color:#888;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mcard-a{display:flex;gap:8px;margin-top:10px;}
.ccard{background:#fff;border-radius:13px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ccard-hd{padding:12px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.crank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.r1{background:#fef3c7;color:#92400e;}.r2{background:#f3f4f6;color:#374151;}.r3{background:#fce7f3;color:#9d174d;}.rn{background:#ede9fe;color:#5b21b6;}
.ccard-main{flex:1;min-width:0;}
.ccard-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ccard-sub{font-size:11px;color:#888;margin-top:2px;}
.ccard-score{font-size:20px;font-weight:700;color:#6d28d9;flex-shrink:0;}
.cchev{font-size:9px;color:#ccc;padding:4px 2px;background:none;border:none;cursor:pointer;transition:transform .2s;flex-shrink:0;}
.ccard.open .cchev{transform:rotate(180deg);}
.ccard-body{display:none;border-top:1px solid #f2f2f7;}.ccard.open .ccard-body{display:block;}
.ccard-det{padding:10px 13px;background:#fafafa;border-bottom:1px solid #f2f2f7;display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:#555;}
.ccard-det span b{color:#1c1c1e;}
.sbars{padding:10px 13px;border-bottom:1px solid #f2f2f7;}
.sbar-r{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;}
.sbar-lbl{width:90px;color:#555;flex-shrink:0;}
.sbar-out{flex:1;height:6px;background:#f2f2f7;border-radius:3px;overflow:hidden;}
.sbar-in{height:100%;border-radius:3px;background:#6d28d9;}
.sbar-v{width:12px;font-weight:700;color:#6d28d9;flex-shrink:0;}
.barr-wrap{padding:10px 13px;border-bottom:1px solid #f2f2f7;}
.barr-lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.barr-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.bchip{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid #ddd;cursor:pointer;background:#fff;color:#374151;}
.bchip.sel{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.cdoc-list{padding:10px 13px;}
.cdoc-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.cdoc-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f9f9f9;font-size:12px;}
.cdoc-row:last-child{border-bottom:none;}
.citycard{background:#fff;border-radius:13px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.citycard-hd{padding:12px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.city-ico{width:36px;height:36px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.city-main{flex:1;min-width:0;}
.city-nm{font-size:15px;font-weight:700;}
.city-sb{font-size:11px;color:#888;margin-top:2px;}
.city-cnt{font-size:20px;font-weight:700;color:#6d28d9;flex-shrink:0;}
.city-chev{font-size:9px;color:#ccc;padding:4px 2px;background:none;border:none;cursor:pointer;transition:transform .2s;flex-shrink:0;}
.citycard.open .city-chev{transform:rotate(180deg);}
.citycard-body{display:none;border-top:1px solid #f2f2f7;}.citycard.open .citycard-body{display:block;}
.city-pot{padding:10px 13px;background:#fafafa;border-bottom:1px solid #f2f2f7;display:flex;gap:8px;align-items:center;}
.cpot{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:700;}
.city-docs{padding:0 13px 8px;}
.city-doc-item{padding:7px 0;border-bottom:1px solid #f9f9f9;font-size:13px;display:flex;align-items:center;gap:6px;}
.city-doc-item:last-child{border-bottom:none;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.metric{border-radius:12px;padding:12px;text-align:center;}
.metric .ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
.metric .mv{font-size:26px;font-weight:700;}
.m1{background:#ede9fe;}.m1 .ml{color:#6d28d9;}.m1 .mv{color:#6d28d9;}
.m2{background:#d1fae5;}.m2 .ml{color:#065f46;}.m2 .mv{color:#065f46;}
.m3{background:#dbeafe;}.m3 .ml{color:#1e40af;}.m3 .mv{color:#1e40af;}
.m4{background:#fef3c7;}.m4 .ml{color:#92400e;}.m4 .mv{color:#92400e;}
.icard{background:#fff;border-radius:13px;padding:13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.icard h3{font-size:14px;font-weight:700;margin-bottom:8px;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f2f2f7;font-size:13px;gap:8px;}
.irow:last-child{border-bottom:none;}
.irow span:first-child{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pill{padding:2px 8px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap;}
.pg{background:#d1fae5;color:#065f46;}.po{background:#fef3c7;color:#92400e;}.pr{background:#fee2e2;color:#b91c1c;}.pb{background:#dbeafe;color:#1e40af;}
.prog{height:5px;border-radius:3px;background:#f2f2f7;overflow:hidden;width:60px;}
.pf{height:100%;border-radius:3px;background:#6d28d9;}
.tip{border-left:3px solid #6d28d9;background:#f5f3ff;border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:8px;font-size:13px;color:#4c1d95;line-height:1.5;}
.tip b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.sec-title{font-size:15px;font-weight:700;margin:14px 0 8px;}
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;}
.ov.on{display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px 40px;max-height:90vh;overflow-y:auto;}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.mhd h2{font-size:17px;font-weight:700;}
.mhd button{background:none;border:none;font-size:22px;color:#888;cursor:pointer;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #ddd;font-size:15px;font-family:-apple-system,sans-serif;background:#f9f9f9;color:#1c1c1e;outline:none;-webkit-appearance:none;}
.field textarea{resize:vertical;min-height:90px;line-height:1.5;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.brow{display:flex;gap:9px;margin-top:8px;}
.bsave{flex:1;background:#6d28d9;color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
.bdel{flex:1;background:#dc2626;color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
.bcanc{flex:1;background:#f2f2f7;color:#333;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;}
.empty{text-align:center;padding:50px 20px;color:#888;font-size:14px;}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn on" id="t0" onclick="goTab(0)">👨‍⚕️ Médicos</button>
  <button class="tab-btn" id="t1" onclick="goTab(1)">📄 Materiais</button>
  <button class="tab-btn" id="t2" onclick="goTab(2)">🏆 Contas</button>
  <button class="tab-btn" id="t3" onclick="goTab(3)">🗺️ Cidades</button>
  <button class="tab-btn" id="t4" onclick="goTab(4)">📊 Insights</button>
</div>

<div class="sync-bar">
  <div class="sync-dot syncing" id="syncDot"></div>
  <span id="syncTxt">Conectando ao Firebase...</span>
</div>

<div class="page on" id="p0">
  <div class="hdr">
    <div><h1>Sarclisa · Materiais</h1><p>Sincronizado em todos os devices 🔄</p></div>
    <button class="hdr-btn" onclick="openDocModal(-1)">+ Médico</button>
  </div>
  <div class="sbar"><input id="srch" type="search" placeholder="🔍 Nome, cidade ou conta..." oninput="renderDocs()" autocomplete="off" autocorrect="off" spellcheck="false"></div>
  <div class="ctrl-row">
    <select id="docSort" onchange="renderDocs()">
      <option value="score">Ordenar: Score</option>
      <option value="nome">Ordenar: Nome</option>
      <option value="cidade">Ordenar: Cidade</option>
      <option value="potencial">Ordenar: Potencial</option>
    </select>
    <button class="ctrl-btn" onclick="exportCSV()">📥 CSV</button>
    <button class="ctrl-btn primary" onclick="exportJSON()">💾 Backup</button>
    <button class="ctrl-btn" onclick="document.getElementById('importFile').click()">📂 Restaurar</button>
    <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importJSON(event)">
  </div>
  <div class="chips" id="chipRow"></div>
  <div class="pot-row">
    <button class="pc pcA" id="pcA" onclick="togglePot('A')">● A</button>
    <button class="pc pcB" id="pcB" onclick="togglePot('B')">● B</button>
    <button class="pc pcC" id="pcC" onclick="togglePot('C')">● C</button>
  </div>
  <div class="note">💡 Clique <strong>Enviar</strong> → WhatsApp abre com texto. Use 📎 para imagem. Toque em <strong>✓ Enviado em DD/MM</strong> para desfazer.</div>
  <div class="stline" id="stline"></div>
  <div class="dlist" id="dlist"></div>
  <button class="fab" onclick="openDocModal(-1)">+</button>
</div>

<div class="page" id="p1">
  <div class="pwrap">
    <div class="phd"><h2>Materiais</h2><button class="hdr-btn" style="background:#6d28d9;color:#fff" onclick="openMatModal(-1)">+ Novo</button></div>
    <div id="matList"></div>
  </div>
</div>

<div class="page" id="p2">
  <div class="pwrap"><div class="phd"><h2>Ranking de Contas</h2></div><div id="contaList"></div></div>
</div>

<div class="page" id="p3">
  <div class="pwrap"><div class="phd"><h2>Clusters por Cidade</h2></div><div id="cityList"></div></div>
</div>

<div class="page" id="p4">
  <div class="pwrap"><h2 style="margin-bottom:12px">📊 Insights</h2><div id="insDiv"></div></div>
</div>

<!-- MODAL MÉDICO -->
<div class="ov" id="docOv">
  <div class="modal">
    <div class="mhd"><h2 id="docMT">Médico</h2><button onclick="closeDocModal()">×</button></div>
    <input type="hidden" id="dIdx">
    <div class="field"><label>Nome</label><input id="dName" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false"></div>
    <div class="f2">
      <div class="field"><label>CRM</label><input id="dCrm" autocomplete="off" spellcheck="false"></div>
      <div class="field"><label>Potencial</label><select id="dPot"><option value="A">A – Alta</option><option value="B">B – Média</option><option value="C" selected>C – Monitor.</option></select></div>
    </div>
    <div class="field"><label>WhatsApp (ex: 19-99999-9999)</label><input id="dPhone" type="tel"></div>
    <div class="f2">
      <div class="field"><label>Cidade</label><input id="dCity" autocomplete="off" autocorrect="off" spellcheck="false"></div>
      <div class="field"><label>Especialidade</label><select id="dEsp"><option value="Hematologia (BR)">Hematologia</option><option value="Farmacia (BR)">Farmácia</option></select></div>
    </div>
    <div class="field"><label>Conta / Instituição</label><input id="dConta" autocomplete="off" spellcheck="false"></div>
    <div class="field">
      <label>Marcadores de score</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;" id="scoreChips">
        <button type="button" class="bchip" data-v="hasAccess" onclick="toggleSc(this)">✓ Acesso institucional (+3)</button>
        <button type="button" class="bchip" data-v="testedSarc" onclick="toggleSc(this)">✓ Testou Sarclisa (+2)</button>
        <button type="button" class="bchip" data-v="daraRelacao" onclick="toggleSc(this)">✓ Experiência com Dara (+1)</button>
        <button type="button" class="bchip" data-v="aberturaGuideline" onclick="toggleSc(this)">✓ Aberto a guideline (+1)</button>
        <button type="button" class="bchip" data-v="noAccess" onclick="toggleSc(this)">✗ Sem acesso (−2)</button>
        <button type="button" class="bchip" data-v="prefereSQ" onclick="toggleSc(this)">✗ Prefere SC/SQ (−2)</button>
        <button type="button" class="bchip" data-v="concorrenciaForte" onclick="toggleSc(this)">✗ Concorrência forte (−2)</button>
      </div>
    </div>
    <div class="brow"><button class="bcanc" onclick="closeDocModal()">Cancelar</button><button class="bsave" onclick="saveDoc()">Salvar</button></div>
  </div>
</div>

<!-- MODAL MATERIAL -->
<div class="ov" id="matOv">
  <div class="modal">
    <div class="mhd"><h2 id="matMT">Material</h2><button onclick="closeMatModal()">×</button></div>
    <input type="hidden" id="mIdx">
    <div class="field"><label>Nome</label><input id="mName"></div>
    <div class="field"><label>Mensagem WhatsApp</label><textarea id="mMsg" placeholder="Olá! ..."></textarea></div>
    <div class="brow"><button class="bcanc" onclick="closeMatModal()">Cancelar</button><button class="bsave" onclick="saveMat()">Salvar</button></div>
  </div>
</div>

<!-- MODAL DELETE -->
<div class="ov" id="delOv">
  <div class="modal">
    <div class="mhd"><h2>Confirmar</h2><button onclick="closeDelOv()">×</button></div>
    <p id="delMsg" style="font-size:14px;color:#333;margin-bottom:20px;line-height:1.5;"></p>

function setSync(state,txt){document.getElementById('syncDot').className='sync-dot '+state;document.getElementById('syncTxt').textContent=txt;}

// ══════════════════════════════════════════════════════
// FIREBASE — escuta mudanças em tempo real
// ══════════════════════════════════════════════════════
dbRef.on('value',function(snap){
  var data=snap.val();
  if(data){
    mats=data.mats||MATS_DEF;
    docs=data.docs||DOCS_DEF;
    sent=data.sent||{};
    cExtra=data.cExtra||{};
  } else {
    mats=MATS_DEF;docs=DOCS_DEF;sent={};cExtra={};
    dbRef.set({mats:mats,docs:docs,sent:sent,cExtra:cExtra});
  }
  fbLoaded=true;
  setSync('ok','Sincronizado · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  renderDocs();
  if(document.getElementById('p1').classList.contains('on'))renderMats();
  if(document.getElementById('p2').classList.contains('on'))renderContas();
  if(document.getElementById('p3').classList.contains('on'))renderCities();
  if(document.getElementById('p4').classList.contains('on'))renderInsights();
},function(){
  setSync('err','Offline — dados locais');
  try{var v=localStorage.getItem('s5m');if(v)mats=JSON.parse(v);else mats=MATS_DEF;}catch(e){mats=MATS_DEF;}
  try{var v=localStorage.getItem('s5d');if(v)docs=JSON.parse(v);else docs=DOCS_DEF;}catch(e){docs=DOCS_DEF;}
  try{var v=localStorage.getItem('s5s');if(v)sent=JSON.parse(v);}catch(e){}
  try{var v=localStorage.getItem('s5c');if(v)cExtra=JSON.parse(v);}catch(e){}
  fbLoaded=true;renderDocs();
});

// Salva no Firebase + localStorage (fallback offline)
function persist(){
  setSync('syncing','Salvando...');
  dbRef.set({mats:mats,docs:docs,sent:sent,cExtra:cExtra}).catch(function(){setSync('err','Erro ao salvar');});
  try{localStorage.setItem('s5m',JSON.stringify(mats));localStorage.setItem('s5d',JSON.stringify(docs));localStorage.setItem('s5s',JSON.stringify(sent));localStorage.setItem('s5c',JSON.stringify(cExtra));}catch(e){}
}

function calcScore(d){var s=0;if(d.pot==='A')s+=3;else if(d.pot==='B')s+=1;var f=d.scoreFlags||{};if(f.hasAccess)s+=3;if(f.testedSarc)s+=2;if(f.daraRelacao)s+=1;if(f.aberturaGuideline)s+=1;if(f.noAccess)s-=2;if(f.prefereSQ)s-=2;if(f.concorrenciaForte)s-=2;return s;}
function scoreLabel(s){if(s>=5)return{cls:'s-hi',txt:'⚡ Alta'};if(s>=2)return{cls:'s-md',txt:'→ Média'};return{cls:'s-lo',txt:'· Monitor.'};}
function tc(s){if(!s)return'';return s.toLowerCase().replace(/\b(\w)/g,function(c){return c.toUpperCase();});}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function wurl(ph,msg){var n=String(ph||'').replace(/\D/g,'');if(!n)return'#';if(n.length<=11)n='55'+n;return'https://wa.me/'+n+'?text='+encodeURIComponent(msg||'');}
function sk(n,i){return n+'__'+i;}
function fmtDate(iso){if(!iso)return'';var d=new Date(iso);return d.getDate()+'/'+(d.getMonth()+1).toString().padStart(2,'0');}

    if(sv==='nome')return a.d.name.localeCompare(b.d.name);

    if(sv==='potencial'){var p=(PO[a.d.pot]||0)-(PO[b.d.pot]||0);return p!==0?p:a.d.name.localeCompare(b.d.name);}
    var sa=calcScore(a.d),sb=calcScore(b.d);if(sb!==sa)return sb-sa;if(!!b.d.phone!==!!a.d.phone)return a.d.phone?-1:1;return a.d.name.localeCompare(b.d.name);
  });

function saveDoc(){
  var nm=document.getElementById('dName').value.trim().toUpperCase();if(!nm){alert('Informe o nome.');return;}
  var d={name:nm,crm:document.getElementById('dCrm').value.trim(),pot:document.getElementById('dPot').value,phone:document.getElementById('dPhone').value.trim(),city:document.getElementById('dCity').value.trim().toUpperCase(),esp:document.getElementById('dEsp').value,conta:document.getElementById('dConta').value.trim(),scoreFlags:JSON.parse(JSON.stringify(scFlags))};
  if(editDocIdx===-1)docs.push(d);else docs[editDocIdx]=d;
  persist();closeDocModal();
}

// ══════════════════════════════════════════════════════
// MATERIAIS
// ══════════════════════════════════════════════════════
function openMatModal(idx){editMatIdx=idx;document.getElementById('matMT').childNodes[0].nodeValue=idx===-1?'Novo Material ':'Editar Material ';document.getElementById('mName').value=idx>=0?mats[idx].name:'';document.getElementById('mMsg').value=idx>=0?mats[idx].msg:'';document.getElementById('matOv').classList.add('on');}
function closeMatModal(){document.getElementById('matOv').classList.remove('on');}
function saveMat(){var nm=document.getElementById('mName').value.trim(),msg=document.getElementById('mMsg').value.trim();if(!nm||!msg){alert('Preencha nome e mensagem.');return;}if(editMatIdx===-1)mats.push({name:nm,msg:msg});else mats[editMatIdx]={name:nm,msg:msg};persist();closeMatModal();}
function renderMats(){var h='';for(var i=0;i<mats.length;i++){var m=mats[i];h+='<div class="mcard"><div class="mcard-t">'+esc(m.name)+'</div><div class="mcard-p">'+esc(m.msg)+'</div><div class="mcard-a"><button class="ibtn" onclick="openMatModal('+i+')">✏️ Editar</button><button class="ibtn d" onclick="askDel(\'mat\','+i+')">🗑️ Excluir</button></div></div>';}document.getElementById('matList').innerHTML=h;}

// ══════════════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════════════
function askDel(type,idx){delType=type;delIdx=idx;var lb=type==='doc'?tc(docs[idx].name):mats[idx].name;document.getElementById('delMsg').textContent='Excluir "'+lb+'"? Não pode ser desfeito.';document.getElementById('delOv').classList.add('on');}
function closeDelOv(){document.getElementById('delOv').classList.remove('on');}
function confirmDel(){if(delType==='doc')docs.splice(delIdx,1);else{mats.splice(delIdx,1);if(activeMat>=mats.length)activeMat=-1;}persist();closeDelOv();}

// ══════════════════════════════════════════════════════
// CONTAS
// ══════════════════════════════════════════════════════
function renderContas(){
  var cdMap={};for(var i=0;i<docs.length;i++){var d=docs[i],c=d.conta||'Sem conta';if(!cdMap[c])cdMap[c]=[];cdMap[c].push(d);}
  var contas=CONTAS_DEF.slice();
  for(var cn in cdMap){var found=false;for(var j=0;j<contas.length;j++){if(contas[j].conta===cn){found=true;break;}}if(!found)contas.push({conta:cn,scoreTam:1,scoreMom:1,scorePot:1,scoreEsp:1,scoreTotal:4,mat:0,ytd:0,prioridade:'Monitoramento'});}
  contas.sort(function(a,b){return b.scoreTotal-a.scoreTotal;});
  var priCol={'Prioridade Máxima':'r1','Prioridade Alta':'r2','Prioridade Média':'r3','Monitoramento':'rn'};
  var html='';
  for(var idx=0;idx<contas.length;idx++){
    var ct=contas[idx],cdocs=cdMap[ct.conta]||[],ext=cExtra[ct.conta]||{},barreira=ext.barreira||'',barreiraNota=ext.barreiraNota||'';
    var pA=0,pB=0,pC=0;for(var k=0;k<cdocs.length;k++){if(cdocs[k].pot==='A')pA++;else if(cdocs[k].pot==='B')pB++;else pC++;}
    var rc=priCol[ct.prioridade]||'rn';
    var rk=idx<3?['🥇','🥈','🥉'][idx]:'#'+(idx+1);
    var bchips='';for(var bi=0;bi<BARREIRAS.length;bi++){bchips+='<button class="bchip'+(barreira===BARREIRAS[bi]?' sel':'')+'" onclick="setBarreira(\''+esc(ct.conta)+'\',\''+esc(BARREIRAS[bi])+'\')">'+BARREIRAS[bi]+'</button>';}
    var docRows='';for(var di2=0;di2<cdocs.length;di2++){var dd=cdocs[di2],dsc=calcScore(dd),dsl=scoreLabel(dsc);docRows+='<div class="cdoc-row"><span class="badge b'+dd.pot+'">'+dd.pot+'</span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(tc(dd.name))+'</span><span class="sc-badge '+dsl.cls+'" style="font-size:10px;">'+dsc+'pts</span></div>';}
    html+='<div class="ccard" id="cc'+idx+'"><div class="ccard-hd" onclick="toggleCc('+idx+')"><div class="crank '+rc+'">'+rk+'</div><div class="ccard-main"><div class="ccard-name">'+esc(ct.conta)+'</div><div class="ccard-sub">'+ct.prioridade+' · '+cdocs.length+' méd · A:'+pA+' B:'+pB+' C:'+pC+(barreira?' · ⚠️ '+esc(barreira):'')+'</div></div><div class="ccard-score">'+ct.scoreTotal+'</div><button class="cchev">▼</button></div>'+'<div class="ccard-body"><div class="ccard-det"><span><b>MAT:</b> '+ct.mat+'</span><span><b>YTD:</b> '+ct.ytd+'</span><span><b>Tam:</b> '+ct.scoreTam+'/3</span><span><b>Mom:</b> '+ct.scoreMom+'/3</span><span><b>Pot:</b> '+ct.scorePot+'/3</span><span><b>Espaço:</b> '+ct.scoreEsp+'/3</span></div>'+'<div class="sbars">'+bar('Tamanho',ct.scoreTam)+bar('Momento',ct.scoreMom)+bar('Pot.estrat.',ct.scorePot)+bar('Espaço',ct.scoreEsp)+'</div>'+'<div class="barr-wrap"><div class="barr-lbl">Barreira principal</div><div class="barr-chips">'+bchips+'</div><input type="text" placeholder="Nota livre..." value="'+esc(barreiraNota)+'" style="width:100%;padding:8px 12px;border-radius:9px;border:1px solid #ddd;font-size:13px;background:#f9f9f9;font-family:-apple-system,sans-serif;outline:none;" oninput="setBarreiraNota(\''+esc(ct.conta)+'\',this.value)"></div>'+'<div class="cdoc-list"><div class="cdoc-title">Médicos ('+cdocs.length+')</div>'+docRows+'</div></div></div>';
  }
  document.getElementById('contaList').innerHTML=html;
}
function bar(label,val){return'<div class="sbar-r"><span class="sbar-lbl">'+label+'</span><div class="sbar-out"><div class="sbar-in" style="width:'+(val/3*100)+'%"></div></div><span class="sbar-v">'+val+'</span></div>';}
function toggleCc(i){var el=document.getElementById('cc'+i);if(el)el.classList.toggle('open');}
function setBarreira(conta,val){if(!cExtra[conta])cExtra[conta]={};cExtra[conta].barreira=cExtra[conta].barreira===val?'':val;persist();}
function setBarreiraNota(conta,val){if(!cExtra[conta])cExtra[conta]={};cExtra[conta].barreiraNota=val;persist();}

// ══════════════════════════════════════════════════════
// CIDADES
// ══════════════════════════════════════════════════════
function renderCities(){
  var cityMap={};for(var i=0;i<docs.length;i++){var d=docs[i],c=d.city||'Sem cidade';if(!cityMap[c])cityMap[c]=[];cityMap[c].push(d);}
  var cities=Object.keys(cityMap).map(function(c){return{city:c,docs:cityMap[c]};});
  cities.sort(function(a,b){return b.docs.length-a.docs.length;});
  var icons={'CAMPINAS':'🏙️','CAMPO GRANDE':'🌿','SOROCABA':'⚙️','BAURU':'🌾','VARGINHA':'☕','DOURADOS':'🌻','PIRACICABA':'🏭','BRAGANÇA PAULISTA':'🏔️','JUNDIAÍ':'🍇','LIMEIRA':'🍊','POÇOS DE CALDAS':'♨️','MARILIA':'🌾','SALTO':'💧','JAU':'🎨','SÃO JOÃO DA BOA VISTA':'🌄','LAVRAS':'🌿','MOGI MIRIM':'🏘️','MOGI GUAÇU':'🌳','RIO CLARO':'💧','SAO CARLOS':'🎓','ITAJUBÁ':'⛰️','BOTUCATU':'🏥','AMERICANA':'🏭','INDAIATUBA':'🏘️','ARARAS':'🌾','TRÊS CORAÇÕES':'❤️'};
  var html='';
  for(var ci=0;ci<cities.length;ci++){
    var ct=cities[ci],cdocs=ct.docs,pA=0,pB=0,pC=0,totalSc=0;
    for(var di=0;di<cdocs.length;di++){var d=cdocs[di],sc=calcScore(d);if(d.pot==='A')pA++;else if(d.pot==='B')pB++;else pC++;totalSc+=sc;}
    var avgSc=cdocs.length?(totalSc/cdocs.length).toFixed(1):0;
    var icon=icons[ct.city]||'📍';
    var sd=cdocs.slice().sort(function(a,b){return calcScore(b)-calcScore(a);});
    var dr='';for(var di=0;di<sd.length;di++){var d=sd[di],sc=calcScore(d),sl=scoreLabel(sc);dr+='<div class="city-doc-item"><span class="badge b'+d.pot+'">'+d.pot+'</span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(tc(d.name))+'</span>'+(d.phone?'<span style="font-size:10px;color:#888;">'+esc(d.phone)+'</span>':'<span style="font-size:10px;color:#dc2626;">sem nº</span>')+'<span class="sc-badge '+sl.cls+'" style="font-size:10px;flex-shrink:0;">'+sc+'</span></div>';}
    html+='<div class="citycard" id="cy'+ci+'"><div class="citycard-hd" onclick="toggleCity('+ci+')"><div class="city-ico">'+icon+'</div><div class="city-main"><div class="city-nm">'+esc(tc(ct.city))+'</div><div class="city-sb">Score médio: '+avgSc+' · A:'+pA+' B:'+pB+' C:'+pC+'</div></div><div class="city-cnt">'+cdocs.length+'</div><button class="city-chev">▼</button></div><div class="citycard-body"><div class="city-pot"><span class="cpot pcA">A: '+pA+'</span><span class="cpot pcB">B: '+pB+'</span><span class="cpot pcC">C: '+pC+'</span><span style="margin-left:auto;font-size:11px;color:#888;">Sc.médio: '+avgSc+'</span></div><div class="city-docs">'+dr+'</div></div></div>';
  }
  document.getElementById('cityList').innerHTML=html;
}
function toggleCity(i){var el=document.getElementById('cy'+i);if(el)el.classList.toggle('open');}

// ══════════════════════════════════════════════════════
// INSIGHTS
// ══════════════════════════════════════════════════════
function renderInsights(){
  var total=docs.length,withPhone=0,totalSent=Object.keys(sent).length;
  for(var i=0;i<docs.length;i++){if(docs[i].phone)withPhone++;}
  var cov=total*mats.length?Math.round(totalSent/(total*mats.length)*100):0;
  var hiPri=0;for(var i=0;i<docs.length;i++){if(calcScore(docs[i])>=5)hiPri++;}
  var byMat=mats.map(function(m,i){var c=0;docs.forEach(function(d){if(sent[sk(d.name,i)])c++;});return{name:m.name,c:c,pct:total?Math.round(c/total*100):0};}).sort(function(a,b){return b.c-a.c;});
  var byCity={};docs.forEach(function(d){if(d.city)byCity[d.city]=(byCity[d.city]||0)+1;});
  var topCities=Object.keys(byCity).map(function(c){return[c,byCity[c]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var topDocs=docs.map(function(d){var c=0;for(var i=0;i<mats.length;i++){if(sent[sk(d.name,i)])c++;}return{name:d.name,pot:d.pot,c:c};}).filter(function(d){return d.c>0;}).sort(function(a,b){return b.c-a.c;}).slice(0,5);
  document.getElementById('insDiv').innerHTML=
    '<div class="mgrid"><div class="metric m1"><span class="ml">Médicos</span><span class="mv">'+total+'</span></div><div class="metric m2"><span class="ml">Enviados</span><span class="mv">'+totalSent+'</span></div><div class="metric m3"><span class="ml">Cobertura</span><span class="mv">'+cov+'%</span></div><div class="metric m4"><span class="ml">⚡ Alta pri.</span><span class="mv">'+hiPri+'</span></div></div>'+
    '<div class="icard"><h3>📊 Cobertura por material</h3>'+byMat.map(function(m){var cls=m.pct>=50?'pg':m.pct>=20?'po':'pr';return'<div class="irow"><span>'+esc(m.name)+'</span><div style="display:flex;align-items:center;gap:6px;flex-shrink:0"><div class="prog"><div class="pf" style="width:'+m.pct+'%"></div></div><span class="pill '+cls+'">'+m.c+' ('+m.pct+'%)</span></div></div>';}).join('')+'</div>'+
    '<div class="icard"><h3>🗺️ Top cidades</h3>'+topCities.map(function(c){return'<div class="irow"><span>'+esc(tc(c[0]))+'</span><span class="pill pb">'+c[1]+'</span></div>';}).join('')+'</div>'+
    '<div class="icard"><h3>📱 Contatos</h3><div class="irow"><span>Com WhatsApp</span><span class="pill pg">'+withPhone+'</span></div><div class="irow"><span>Sem número</span><span class="pill '+(total-withPhone>0?'pr':'pg')+'">'+(total-withPhone)+'</span></div></div>'+
    (topDocs.length?'<div class="icard"><h3>🏆 Mais impactados</h3>'+topDocs.map(function(d){return'<div class="irow"><span><span class="badge b'+d.pot+'">'+d.pot+'</span>'+esc(tc(d.name))+'</span><span class="pill pg">'+d.c+'/'+mats.length+'</span></div>';}).join('')+'</div>':'')+
    '<div class="sec-title">💡 Dicas</div>'+
    '<div class="tip"><b>🔄 Sincronização em tempo real</b>Qualquer alteração feita no celular aparece automaticamente no computador e vice-versa via Firebase. O ponto verde indica conexão ativa.</div>'+
    '<div class="tip"><b>🎯 Score de prioridade</b>Edite o médico e marque critérios. Potencial A (+3), Acesso (+3), Sarclisa (+2), Dara (+1), Guideline (+1), Sem acesso (−2), SC/SQ (−2), Concorrência (−1).</div>'+
    '<div class="tip"><b>✓ Desfazer envio</b>Toque no badge verde "✓ Enviado em DD/MM" para remover o registro.</div>'+
    '<div class="tip"><b>🏦 Barreiras por conta</b>Na aba Contas, registre a barreira de cada instituição para orientar a abordagem certa.</div>'+
    '<div class="tip"><b>📌 Instalar no iPhone</b>Safari → Compartilhar → "Adicionar à Tela de Início". Abre em tela cheia, funciona offline com dados em cache.</div>';
}

// ══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════════════
function exportJSON(){var p={version:2,exportedAt:new Date().toISOString(),mats:mats,docs:docs,sent:sent,cExtra:cExtra};var b=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sarclisa-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href);},3000);}
function exportCSV(){var hd=['Nome','CRM','Potencial','Cidade','Conta','WhatsApp','Score','Marcadores'];var rows=[hd.join(';')];docs.forEach(function(d){var f=d.scoreFlags||{},m=[];if(f.hasAccess)m.push('Acesso');if(f.testedSarc)m.push('Sarclisa');if(f.daraRelacao)m.push('Dara');if(f.aberturaGuideline)m.push('Guideline');if(f.noAccess)m.push('Sem acesso');if(f.prefereSQ)m.push('SC/SQ');if(f.concorrenciaForte)m.push('Concorrência');rows.push([d.name||'',d.crm||'',d.pot||'',d.city||'',d.conta||'',d.phone||'',calcScore(d),m.join(' | ')].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(';'));});var csv='\uFEFF'+rows.join('\n');var b=new Blob([csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='medicos-'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href);},3000);}
function importJSON(evt){var file=evt.target.files&&evt.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(){try{var p=JSON.parse(String(r.result||'{}'));if(!p||!Array.isArray(p.docs)||!Array.isArray(p.mats))throw new Error();mats=p.mats;docs=p.docs;sent=p.sent||{};cExtra=p.cExtra||{};persist();alert('Importado ✅ — sincronizando em todos os devices...');}catch(e){alert('Arquivo inválido.');}evt.target.value='';};r.readAsText(file);}
</script>
