<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sarclisa</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
/* Seus estilos originais mantidos */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:16px;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:100;}
.tab-btn{flex:1;padding:11px 2px 9px;font-size:11px;font-weight:700;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.tab-btn.on{color:#6d28d9;border-bottom-color:#6d28d9;}
.page{display:none;}.page.on{display:block;}
.sync-bar{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;color:#888;background:#f9f9f9;border-bottom:1px solid #eee;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sync-dot.ok{background:#22c55e;}.sync-dot.err{background:#ef4444;}.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr{background:#6d28d9;color:#fff;padding:13px 14px 11px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.hdr h1{font-size:17px;font-weight:700;}.hdr p{font-size:11px;opacity:.8;margin-top:2px;}
.hdr-btn{background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:18px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.sbar{padding:9px 12px 0;background:#f2f2f7;}.sbar input{width:100%;padding:9px 14px;border-radius:11px;border:1px solid #ddd;font-size:15px;background:#fff;outline:none;}
.dlist{padding:0 12px 90px;}
.dc{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;}
.ov.on{display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px 40px;max-height:90vh;overflow-y:auto;}
.field label{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;}
.field input, .field select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #ddd;background:#f9f9f9;font-size:15px;}
.bud-fab{position:fixed;bottom:22px;right:16px;width:52px;height:52px;border-radius:50%;background:#6d28d9;color:#fff;font-size:28px;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(109,40,217,.4);}
/* Adições para a fusão Materiais/Insights */
.mat-section{border-top:2px solid #eee;margin-top:20px;padding-top:15px;}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn on" id="t0" onclick="goTab(0)">👨‍⚕️ Médicos</button>
  <button class="tab-btn" id="t2" onclick="goTab(2)">🏆 Contas</button>
  <button class="tab-btn" id="t3" onclick="goTab(3)">🗺️ Cidades</button>
  <button class="tab-btn" id="t4" onclick="goTab(4)">📊 Insights/Mat</button>
  <button class="tab-btn" id="t5" onclick="goTab(5)">💰 Budget</button>
</div>

<div class="sync-bar">
  <div class="sync-dot syncing" id="syncDot"></div>
  <span id="syncTxt">Conectando...</span>
</div>

<div class="page on" id="p0">
  <div class="hdr">
    <div><h1>Médicos</h1><p>Gestão de CRM</p></div>
    <button class="hdr-btn" onclick="openDocModal(-1)">+ Médico</button>
  </div>
  <div class="dlist" id="dlist"></div>
</div>

<div class="page" id="p2">
  <div style="padding:15px;"><h2>Contas</h2><div id="contaList"></div></div>
</div>

<div class="page" id="p3">
  <div style="padding:15px;"><h2>Cidades</h2><div id="cityList"></div></div>
</div>

<div class="page" id="p4">
  <div style="padding:15px;">
    <h2>📊 Insights do Mercado</h2>
    <div id="insDiv"></div>
    
    <div class="mat-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h2>📄 Materiais</h2>
        <button class="hdr-btn" style="background:#6d28d9" onclick="openMatModal(-1)">+ Novo Material</button>
      </div>
      <div id="matList"></div>
    </div>
  </div>
</div>

<div class="page" id="p5">
  <div style="padding:15px;">
    <h2>💰 Budget</h2>
    <div id="budHero"></div>
    <div id="budList"></div>
  </div>
  <button class="bud-fab" onclick="openBudModal(-1)">+</button>
</div>

<div class="ov" id="budOv">
  <div class="modal">
    <div class="field">
      <label>Valor (R$)</label>
      <input id="bVal" type="number" step="0.01" inputmode="decimal" placeholder="0,00">
    </div>
    <div class="field">
      <label>Descrição</label>
      <input id="bDesc" type="text">
    </div>
    <button class="hdr-btn" style="background:#6d28d9; width:100%; padding:15px;" onclick="saveBud()">Salvar Lançamento</button>
    <button class="hdr-btn" style="background:#eee; color:#333; width:100%; margin-top:10px;" onclick="closeBudModal()">Cancelar</button>
  </div>
</div>

<script>
// CONFIGURAÇÃO FIREBASE (Substitua pelos seus dados se necessário)
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO.firebaseio.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "ID",
  appId: "APP_ID"
};

// Inicialização
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Lógica de Navegação
function goTab(idx){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('t'+idx).classList.add('on');
  document.getElementById('p'+idx).classList.add('on');
}

// Funções de Modal Budget
function openBudModal(idx){ document.getElementById('budOv').classList.add('on'); }
function closeBudModal(){ document.getElementById('budOv').classList.remove('on'); }

// Status de Sincronização
db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  if (snap.val() === true) {
    dot.className = 'sync-dot ok';
    txt.innerText = 'Online - Sincronizado';
  } else {
    dot.className = 'sync-dot err';
    txt.innerText = 'Offline';
  }
});

// Nota: Adicione aqui as funções renderDocs(), saveBud(), etc., 
// do seu código original para processar os dados do Firebase.
</script>

</body>
</html>
